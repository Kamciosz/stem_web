<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" fill="none">
  <style>
    .bg { fill: #0f0f23; }
    .bar { rx: 6; }
    .bar-text { fill: #fff; font: bold 12px sans-serif; }
    .time-text { fill: #a0a0c0; font: 11px sans-serif; }
    .min-text { fill: #fff; font: bold 11px sans-serif; }
    .label { fill: #6b6b8a; font: 10px sans-serif; }
    .tick { stroke: #2a2a4a; stroke-width: 1; }
  </style>
  
  <rect width="720" height="200" class="bg"/>
  
  <text x="360" y="24" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="bold" font-family="sans-serif">Podział czasu — 150 minut</text>
  
  <!-- Oś czasu -->
  <line x1="40" y1="100" x2="680" y2="100" stroke="#2a2a4a" stroke-width="2"/>
  
  <!-- Ticki co 30 min -->
  <line x1="40" y1="94" x2="40" y2="106" class="tick" stroke-width="2"/>
  <text x="40" y="120" text-anchor="middle" class="time-text">0</text>
  
  <line x1="168" y1="94" x2="168" y2="106" class="tick" stroke-width="2"/>
  <text x="168" y="120" text-anchor="middle" class="time-text">30</text>
  
  <line x1="296" y1="94" x2="296" y2="106" class="tick" stroke-width="2"/>
  <text x="296" y="120" text-anchor="middle" class="time-text">60</text>
  
  <line x1="424" y1="94" x2="424" y2="106" class="tick" stroke-width="2"/>
  <text x="424" y="120" text-anchor="middle" class="time-text">90</text>
  
  <line x1="552" y1="94" x2="552" y2="106" class="tick" stroke-width="2"/>
  <text x="552" y="120" text-anchor="middle" class="time-text">120</text>
  
  <line x1="680" y1="94" x2="680" y2="106" class="tick" stroke-width="2"/>
  <text x="680" y="120" text-anchor="middle" class="time-text">150</text>
  
  <!-- Blok 1: SQL (0-25 min) -->
  <rect x="40" y="50" width="107" height="38" class="bar" fill="#7c3aed"/>
  <text x="93" y="65" text-anchor="middle" class="bar-text">SQL</text>
  <text x="93" y="80" text-anchor="middle" class="min-text">~25 min</text>
  <text x="93" y="42" text-anchor="middle" class="label">4 zapytania • ~8 pkt</text>
  
  <!-- Blok 2: PHP (25-90 min) -->
  <rect x="151" y="50" width="277" height="38" class="bar" fill="#2563eb"/>
  <text x="289" y="65" text-anchor="middle" class="bar-text">PHP — index.php</text>
  <text x="289" y="80" text-anchor="middle" class="min-text">~65 min</text>
  <text x="289" y="42" text-anchor="middle" class="label">połączenie + 3 sekcje • ~16 pkt</text>
  
  <!-- Blok 3: CSS (90-130 min) -->
  <rect x="432" y="50" width="170" height="38" class="bar" fill="#16a34a"/>
  <text x="517" y="65" text-anchor="middle" class="bar-text">CSS — styl.css</text>
  <text x="517" y="80" text-anchor="middle" class="min-text">~40 min</text>
  <text x="517" y="42" text-anchor="middle" class="label">flex + kolory + hover • ~6 pkt</text>
  
  <!-- Blok 4: Sprawdzenie (130-150 min) -->
  <rect x="606" y="50" width="70" height="38" class="bar" fill="#f59e0b"/>
  <text x="641" y="65" text-anchor="middle" class="bar-text">Test</text>
  <text x="641" y="80" text-anchor="middle" class="min-text">~20 min</text>
  <text x="641" y="42" text-anchor="middle" class="label">sprawdź!</text>
  
  <!-- Wskazówki na dole -->
  <text x="40" y="150" fill="#a0a0c0" font-size="11" font-family="sans-serif">💡 SQL rób pierwsze — szybkie punkty, łatwo stracić na głupiej literówce gdy się śpieszysz</text>
  <text x="40" y="168" fill="#a0a0c0" font-size="11" font-family="sans-serif">💡 PHP zajmie najwięcej — JOIN + obliczenie w pętli + rowspan. Nie szukaj skrótów</text>
  <text x="40" y="186" fill="#a0a0c0" font-size="11" font-family="sans-serif">💡 Zostaw 20 min na koniec — odpal w przeglądarce i porównaj z makietą punkt po punkcie</text>
</svg>
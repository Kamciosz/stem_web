<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" fill="none">
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; }
    .bg { fill: #0f0f23; }
    .block { rx: 8; }
    .num { fill: #fff; font-size: 24px; font-weight: 800; }
    .name { fill: #fff; font-size: 14px; font-weight: 700; }
    .time { fill: rgba(255,255,255,0.7); font-size: 12px; }
    .pts { fill: rgba(255,255,255,0.5); font-size: 11px; }
    .tip { fill: #8888aa; font-size: 11px; }
    .title { fill: #a78bfa; font-size: 15px; font-weight: 700; }
  </style>

  <rect width="600" height="220" class="bg"/>
  <text x="300" y="24" text-anchor="middle" class="title">Plan na 150 minut</text>

  <!-- 1. SQL -->
  <rect x="16" y="38" width="130" height="80" class="block" fill="#7c3aed"/>
  <text x="81" y="66" text-anchor="middle" class="num">25'</text>
  <text x="81" y="86" text-anchor="middle" class="name">SQL</text>
  <text x="81" y="102" text-anchor="middle" class="time">4 zapytania</text>
  <text x="81" y="114" text-anchor="middle" class="pts">~8 pkt</text>

  <!-- 2. PHP -->
  <rect x="156" y="38" width="168" height="80" class="block" fill="#2563eb"/>
  <text x="240" y="66" text-anchor="middle" class="num">65'</text>
  <text x="240" y="86" text-anchor="middle" class="name">PHP — index.php</text>
  <text x="240" y="102" text-anchor="middle" class="time">3 sekcje + baza</text>
  <text x="240" y="114" text-anchor="middle" class="pts">~16 pkt</text>

  <!-- 3. CSS -->
  <rect x="334" y="38" width="130" height="80" class="block" fill="#16a34a"/>
  <text x="399" y="66" text-anchor="middle" class="num">40'</text>
  <text x="399" y="86" text-anchor="middle" class="name">CSS — styl.css</text>
  <text x="399" y="102" text-anchor="middle" class="time">flex + kolory + hover</text>
  <text x="399" y="114" text-anchor="middle" class="pts">~6 pkt</text>

  <!-- 4. Test -->
  <rect x="474" y="38" width="110" height="80" class="block" fill="#d97706"/>
  <text x="529" y="66" text-anchor="middle" class="num">20'</text>
  <text x="529" y="86" text-anchor="middle" class="name">Sprawdzenie</text>
  <text x="529" y="102" text-anchor="middle" class="time">przeglądarka</text>
  <text x="529" y="114" text-anchor="middle" class="pts">porównaj z makietą</text>

  <!-- Strzałki między blokami -->
  <text x="150" y="78" fill="#555" font-size="20">→</text>
  <text x="328" y="78" fill="#555" font-size="20">→</text>
  <text x="468" y="78" fill="#555" font-size="20">→</text>

  <!-- Tipy -->
  <text x="20" y="146" class="tip">→ SQL rób pierwsze — szybkie punkty, łatwo stracić na literówce gdy się śpieszysz</text>
  <text x="20" y="166" class="tip">→ PHP zajmie najwięcej — JOIN + obliczenie w pętli + rowspan</text>
  <text x="20" y="186" class="tip">→ Zostaw 20 min na koniec — odpal w przeglądarce i porównaj z makietą</text>
  <text x="20" y="210" fill="#facc15" font-size="12" font-weight="700">Razem: ~30 pkt | Próg zdania: 75% = 22-23 pkt</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; }
    .bg { fill: #0f0f23; }
    .bar { rx: 6; }
    .bar-t { fill: #fff; font-size: 13px; font-weight: 700; }
    .sec { fill: #90EE90; stroke: #228B22; stroke-width: 2; rx: 6; }
    .sec-h { fill: #1a1a2e; font-size: 14px; font-weight: 700; }
    .sec-d { fill: #333; font-size: 11px; }
    .badge { fill: #7c3aed; rx: 4; }
    .badge-t { fill: #e9d5ff; font-size: 10px; font-weight: 700; }
    .dim { fill: #8888aa; font-size: 11px; }
    .label { fill: #a78bfa; font-size: 13px; font-weight: 700; }
    .code { fill: #c0c0e0; font-size: 11px; font-family: 'SF Mono', monospace; }
  </style>

  <rect width="600" height="400" class="bg"/>

  <!-- HEADER -->
  <rect x="20" y="20" width="560" height="30" class="bar" fill="#006400"/>
  <text x="300" y="40" text-anchor="middle" class="bar-t">header — Serwis konfiguracji samochodów</text>

  <!-- NAV -->
  <rect x="20" y="54" width="560" height="22" class="bar" fill="#228B22"/>
  <text x="300" y="70" text-anchor="middle" fill="#ddd" font-size="11" font-family="system-ui">nav — Samochody | Konfigurator | Kontakt</text>

  <!-- MAIN = 3 kolumny -->
  <text x="300" y="96" text-anchor="middle" class="label">main — display: flex</text>

  <!-- #lewa -->
  <rect x="20" y="104" width="180" height="210" class="sec"/>
  <text x="110" y="126" text-anchor="middle" class="sec-h">#lewa (33%)</text>
  <text x="110" y="146" text-anchor="middle" class="sec-d">Tabela: model='alfa'</text>
  <text x="110" y="162" text-anchor="middle" class="sec-d">JOIN kolory + pojazdy</text>
  <text x="110" y="178" text-anchor="middle" class="sec-d">cena = cena + doplata</text>
  <rect x="46" y="190" width="128" height="20" class="badge"/>
  <text x="110" y="204" text-anchor="middle" class="badge-t">obliczenie w PHP!</text>
  <text x="110" y="232" text-anchor="middle" class="dim">tr:hover → ForestGreen</text>
  <text x="110" y="248" text-anchor="middle" class="dim">overflow: auto</text>
  <text x="110" y="264" text-anchor="middle" class="dim">border-collapse</text>

  <!-- #srodkowa -->
  <rect x="210" y="104" width="180" height="210" class="sec"/>
  <text x="300" y="126" text-anchor="middle" class="sec-h">#srodkowa (33%)</text>
  <text x="300" y="146" text-anchor="middle" class="sec-d">2 losowe pojazdy</text>
  <rect x="240" y="156" width="120" height="30" rx="4" fill="#3b82f6"/>
  <text x="300" y="176" text-anchor="middle" fill="#fff" font-size="12">a1.jpg</text>
  <rect x="240" y="192" width="120" height="30" rx="4" fill="#e5e7eb"/>
  <text x="300" y="212" text-anchor="middle" fill="#333" font-size="12">a2.jpg</text>
  <rect x="236" y="232" width="128" height="20" class="badge"/>
  <text x="300" y="246" text-anchor="middle" class="badge-t">RAND() LIMIT 2 + rowspan</text>
  <text x="300" y="272" text-anchor="middle" class="dim">img { width: 95% }</text>
  <text x="300" y="288" text-anchor="middle" class="dim">border-radius: 8px</text>

  <!-- #prawa -->
  <rect x="400" y="104" width="180" height="210" class="sec"/>
  <text x="490" y="126" text-anchor="middle" class="sec-h">#prawa (33%)</text>
  <text x="490" y="146" text-anchor="middle" class="sec-d">Kontakt</text>
  <text x="490" y="170" text-anchor="middle" class="sec-d">tel: 111 222 444</text>
  <rect x="436" y="182" width="108" height="36" rx="4" fill="#ef4444"/>
  <text x="490" y="206" text-anchor="middle" fill="#fff" font-size="12">a3.png</text>
  <rect x="436" y="228" width="108" height="20" fill="#16163a" stroke="#555" stroke-width="1" rx="4"/>
  <text x="490" y="242" text-anchor="middle" class="dim">statyczne HTML</text>

  <!-- FOOTER -->
  <rect x="20" y="322" width="560" height="30" class="bar" fill="#006400"/>
  <text x="300" y="342" text-anchor="middle" class="bar-t">footer — Stronę wykonał: ...</text>

  <!-- CSS pod spodem -->
  <text x="20" y="374" class="code">* { text-align:center; font-family:Helvetica }  section { width:33.3%; height:550px; overflow:auto }</text>
  <text x="20" y="392" class="code">header,footer { background:DarkGreen }  nav { background:ForestGreen }  section { background:LightGreen }</text>
</svg>
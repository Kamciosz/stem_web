<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" fill="none">
  <style>
    .bg { fill: #0f0f23; }
    .table-bg { fill: #1a1a2e; stroke: #7c3aed; stroke-width: 2; rx: 8; }
    .table-header { fill: #7c3aed; }
    .header-text { fill: #fff; font-family: monospace; font-size: 15px; font-weight: bold; }
    .col-text { fill: #e0e0f0; font-family: monospace; font-size: 13px; }
    .type-text { fill: #8888aa; font-family: monospace; font-size: 11px; }
    .pk { fill: #f59e0b; font-family: monospace; font-size: 11px; font-weight: bold; }
    .fk { fill: #ef4444; font-family: monospace; font-size: 11px; font-weight: bold; }
    .note-bg { fill: #12122a; rx: 4; }
    .note { fill: #8888aa; font-family: sans-serif; font-size: 11px; font-style: italic; }
    .arrow { stroke: #a78bfa; stroke-width: 2.5; fill: none; }
    .label-bg { fill: #7c3aed; rx: 6; }
    .label-text { fill: #fff; font-family: sans-serif; font-size: 12px; font-weight: bold; }
    .sub-label { fill: #a78bfa; font-family: sans-serif; font-size: 10px; }
    .formula-bg { fill: #1a1a2e; stroke: #f59e0b; stroke-width: 2; rx: 8; }
    .formula-text { fill: #f59e0b; font-family: monospace; font-size: 14px; font-weight: bold; }
    .row-line { stroke: #2a2a4a; stroke-width: 1; }
  </style>
  <defs>
    <marker id="arr" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#a78bfa"/>
    </marker>
  </defs>
  
  <rect width="800" height="380" class="bg"/>
  
  <!-- ===== TABELA: kolory ===== -->
  <rect x="30" y="30" width="300" height="210" class="table-bg"/>
  <rect x="30" y="30" width="300" height="38" rx="8" class="table-header"/>
  <text x="180" y="56" text-anchor="middle" class="header-text">kolory</text>
  
  <!-- Kolumny -->
  <text x="50" y="90" class="pk">PK</text>
  <text x="80" y="90" class="col-text">id</text>
  <text x="210" y="90" class="type-text">INT AUTO_INCR</text>
  <line x1="40" y1="100" x2="320" y2="100" class="row-line"/>
  
  <text x="80" y="122" class="col-text">nazwa</text>
  <text x="210" y="122" class="type-text">VARCHAR(20)</text>
  <line x1="40" y1="132" x2="320" y2="132" class="row-line"/>
  
  <text x="80" y="154" class="col-text">doplata</text>
  <text x="210" y="154" class="type-text">DECIMAL(10,2)</text>
  
  <!-- Notatki -->
  <rect x="40" y="172" width="280" height="56" class="note-bg"/>
  <text x="54" y="192" class="note">8 kolorów:</text>
  <text x="54" y="208" class="note">• 4 bazowe → dopłata 0 zł</text>
  <text x="54" y="222" class="note">• 4 metalik → dopłata 1000 zł</text>
  
  <!-- ===== TABELA: pojazdy ===== -->
  <rect x="470" y="14" width="300" height="270" class="table-bg"/>
  <rect x="470" y="14" width="300" height="38" rx="8" class="table-header"/>
  <text x="620" y="40" text-anchor="middle" class="header-text">pojazdy</text>
  
  <!-- Kolumny -->
  <text x="490" y="74" class="pk">PK</text>
  <text x="520" y="74" class="col-text">id</text>
  <text x="650" y="74" class="type-text">INT AUTO_INCR</text>
  <line x1="480" y1="84" x2="760" y2="84" class="row-line"/>
  
  <text x="520" y="106" class="col-text">marka</text>
  <text x="650" y="106" class="type-text">VARCHAR(20)</text>
  <line x1="480" y1="116" x2="760" y2="116" class="row-line"/>
  
  <text x="520" y="138" class="col-text">model</text>
  <text x="650" y="138" class="type-text">VARCHAR(20)</text>
  <line x1="480" y1="148" x2="760" y2="148" class="row-line"/>
  
  <text x="520" y="170" class="col-text">cena</text>
  <text x="650" y="170" class="type-text">DECIMAL(15,0)</text>
  <line x1="480" y1="180" x2="760" y2="180" class="row-line"/>
  
  <text x="490" y="202" class="fk">FK</text>
  <text x="520" y="202" class="col-text">kolor</text>
  <text x="650" y="202" class="type-text">INT → kolory.id</text>
  
  <!-- Notatki -->
  <rect x="480" y="218" width="280" height="56" class="note-bg"/>
  <text x="494" y="238" class="note">62 pojazdy:</text>
  <text x="494" y="254" class="note">• marki: BM, AM</text>
  <text x="494" y="268" class="note">• modele: alfa, beta, meta</text>
  
  <!-- ===== STRZAŁKA RELACJI ===== -->
  <path d="M 470 202 L 390 202 L 390 90 L 330 90" class="arrow" marker-end="url(#arr)"/>
  
  <!-- Kółko "1" przy kolory -->
  <circle cx="340" cy="90" r="12" fill="#0f0f23" stroke="#a78bfa" stroke-width="2"/>
  <text x="340" y="95" text-anchor="middle" fill="#a78bfa" font-family="sans-serif" font-size="13" font-weight="bold">1</text>
  
  <!-- Kółko "N" przy pojazdy -->
  <circle cx="470" cy="202" r="12" fill="#0f0f23" stroke="#a78bfa" stroke-width="2"/>
  <text x="470" y="207" text-anchor="middle" fill="#a78bfa" font-family="sans-serif" font-size="13" font-weight="bold">N</text>
  
  <!-- Label na strzałce -->
  <rect x="370" y="132" width="80" height="26" class="label-bg"/>
  <text x="410" y="150" text-anchor="middle" class="label-text">FOREIGN KEY</text>
  
  <!-- ===== FORMUŁA ===== -->
  <rect x="160" y="330" width="480" height="38" class="formula-bg"/>
  <text x="400" y="355" text-anchor="middle" class="formula-text">cena_calkowita = pojazdy.cena + kolory.doplata  (w PHP!)</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 320" fill="none">
  <style>
    text { font-family: 'SF Mono', 'Fira Code', Consolas, monospace; }
    .bg { fill: #0f0f23; }
    .tbl { fill: #16163a; stroke: #7c3aed; stroke-width: 2; rx: 10; }
    .hdr { fill: #7c3aed; rx: 10; }
    .hdr-t { fill: #fff; font-size: 16px; font-weight: 700; }
    .col { fill: #e0e0f0; font-size: 14px; }
    .typ { fill: #7a7a9a; font-size: 12px; }
    .pk { fill: #facc15; font-size: 11px; font-weight: 700; }
    .fk { fill: #f87171; font-size: 11px; font-weight: 700; }
    .sep { stroke: #2a2a50; stroke-width: 1; }
    .note { fill: #7a7a9a; font-size: 11px; font-family: system-ui, sans-serif; }
    .rel { stroke: #a78bfa; stroke-width: 3; fill: none; }
    .circ { fill: #0f0f23; stroke: #a78bfa; stroke-width: 2.5; }
    .circ-t { fill: #a78bfa; font-size: 15px; font-weight: 700; font-family: system-ui, sans-serif; }
    .fk-lbl { fill: #7c3aed; rx: 6; }
    .fk-lbl-t { fill: #fff; font-size: 11px; font-weight: 700; font-family: system-ui, sans-serif; }
    .form { fill: #16163a; stroke: #facc15; stroke-width: 2; rx: 8; }
    .form-t { fill: #facc15; font-size: 15px; font-weight: 700; }
  </style>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#a78bfa"/>
    </marker>
  </defs>

  <rect width="660" height="320" class="bg"/>

  <!-- KOLORY -->
  <rect x="20" y="16" width="240" height="180" class="tbl"/>
  <rect x="20" y="16" width="240" height="34" class="hdr"/>
  <text x="140" y="40" text-anchor="middle" class="hdr-t">kolory</text>

  <text x="40" y="70" class="pk">PK</text>
  <text x="68" y="70" class="col">id</text>
  <text x="180" y="70" class="typ">INT A_I</text>
  <line x1="30" y1="78" x2="250" y2="78" class="sep"/>

  <text x="68" y="98" class="col">nazwa</text>
  <text x="180" y="98" class="typ">VARCHAR(20)</text>
  <line x1="30" y1="106" x2="250" y2="106" class="sep"/>

  <text x="68" y="126" class="col">doplata</text>
  <text x="180" y="126" class="typ">DECIMAL(10,2)</text>
  <line x1="30" y1="136" x2="250" y2="136" class="sep" stroke-dasharray="4"/>

  <text x="36" y="156" class="note">4 bazowe (0 zł)</text>
  <text x="36" y="172" class="note">4 metalik (+1000 zł)</text>

  <!-- POJAZDY -->
  <rect x="400" y="4" width="240" height="224" class="tbl"/>
  <rect x="400" y="4" width="240" height="34" class="hdr"/>
  <text x="520" y="28" text-anchor="middle" class="hdr-t">pojazdy</text>

  <text x="420" y="58" class="pk">PK</text>
  <text x="448" y="58" class="col">id</text>
  <text x="560" y="58" class="typ">INT A_I</text>
  <line x1="410" y1="66" x2="630" y2="66" class="sep"/>

  <text x="448" y="86" class="col">marka</text>
  <text x="560" y="86" class="typ">VARCHAR(20)</text>
  <line x1="410" y1="94" x2="630" y2="94" class="sep"/>

  <text x="448" y="114" class="col">model</text>
  <text x="560" y="114" class="typ">VARCHAR(20)</text>
  <line x1="410" y1="122" x2="630" y2="122" class="sep"/>

  <text x="448" y="142" class="col">cena</text>
  <text x="560" y="142" class="typ">DECIMAL(15,0)</text>
  <line x1="410" y1="150" x2="630" y2="150" class="sep"/>

  <text x="420" y="170" class="fk">FK</text>
  <text x="448" y="170" class="col">kolor</text>
  <text x="560" y="170" class="typ">→ kolory.id</text>
  <line x1="410" y1="180" x2="630" y2="180" class="sep" stroke-dasharray="4"/>

  <text x="416" y="200" class="note">62 pojazdy (BM / AM)</text>
  <text x="416" y="216" class="note">alfa / beta / meta</text>

  <!-- RELACJA -->
  <path d="M400 170 L330 170 L330 70 L260 70" class="rel" marker-end="url(#a)"/>
  <circle cx="270" cy="70" r="14" class="circ"/>
  <text x="270" y="76" text-anchor="middle" class="circ-t">1</text>
  <circle cx="400" cy="170" r="14" class="circ"/>
  <text x="400" y="176" text-anchor="middle" class="circ-t">N</text>

  <rect x="306" y="108" width="48" height="22" class="fk-lbl"/>
  <text x="330" y="123" text-anchor="middle" class="fk-lbl-t">FK</text>

  <!-- FORMUŁA -->
  <rect x="100" y="272" width="460" height="36" class="form"/>
  <text x="330" y="296" text-anchor="middle" class="form-t">cena = pojazdy.cena + kolory.doplata  (PHP!)</text>
</svg>
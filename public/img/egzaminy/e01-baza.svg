<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" fill="none">
  <style>
    .bg { fill: #0f0f23; }
    .table-bg { fill: #1a1a2e; stroke: #7c3aed; stroke-width: 2; rx: 8; }
    .table-header { fill: #7c3aed; }
    .header-text { fill: #fff; font: bold 14px monospace; }
    .col-text { fill: #a0a0c0; font: 13px monospace; }
    .type-text { fill: #6b6b8a; font: 12px monospace; }
    .pk { fill: #f59e0b; font: bold 12px monospace; }
    .fk { fill: #ef4444; font: bold 12px monospace; }
    .arrow { stroke: #7c3aed; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .label { fill: #a78bfa; font: 11px sans-serif; }
    .badge { fill: #7c3aed; rx: 4; }
    .badge-text { fill: #e9d5ff; font: bold 10px sans-serif; }
    .note { fill: #6b6b8a; font: italic 11px sans-serif; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="720" height="340" class="bg"/>
  
  <!-- Tabela: kolory -->
  <rect x="40" y="40" width="260" height="200" class="table-bg"/>
  <rect x="40" y="40" width="260" height="36" rx="8" class="table-header"/>
  <text x="170" y="64" text-anchor="middle" class="header-text">kolory</text>
  
  <text x="60" y="100" class="pk">PK</text>
  <text x="90" y="100" class="col-text">id</text>
  <text x="230" y="100" class="type-text">INT AUTO_INCREMENT</text>
  <line x1="50" y1="110" x2="290" y2="110" stroke="#2a2a4a" stroke-width="1"/>
  
  <text x="90" y="132" class="col-text">nazwa</text>
  <text x="230" y="132" class="type-text">VARCHAR(20)</text>
  <line x1="50" y1="142" x2="290" y2="142" stroke="#2a2a4a" stroke-width="1"/>
  
  <text x="90" y="164" class="col-text">doplata</text>
  <text x="230" y="164" class="type-text">DECIMAL(10,2)</text>
  
  <!-- Dane przykładowe -->
  <line x1="50" y1="180" x2="290" y2="180" stroke="#2a2a4a" stroke-width="1" stroke-dasharray="4"/>
  <text x="60" y="200" class="note">8 kolorów: bazowe (0 zł)</text>
  <text x="60" y="216" class="note">+ metalik (+1000 zł)</text>
  
  <!-- Tabela: pojazdy -->
  <rect x="420" y="20" width="260" height="260" class="table-bg"/>
  <rect x="420" y="20" width="260" height="36" rx="8" class="table-header"/>
  <text x="550" y="44" text-anchor="middle" class="header-text">pojazdy</text>
  
  <text x="440" y="80" class="pk">PK</text>
  <text x="470" y="80" class="col-text">id</text>
  <text x="610" y="80" class="type-text">INT AUTO_INCREMENT</text>
  <line x1="430" y1="90" x2="670" y2="90" stroke="#2a2a4a" stroke-width="1"/>
  
  <text x="470" y="112" class="col-text">marka</text>
  <text x="610" y="112" class="type-text">VARCHAR(20)</text>
  <line x1="430" y1="122" x2="670" y2="122" stroke="#2a2a4a" stroke-width="1"/>
  
  <text x="470" y="144" class="col-text">model</text>
  <text x="610" y="144" class="type-text">VARCHAR(20)</text>
  <line x1="430" y1="154" x2="670" y2="154" stroke="#2a2a4a" stroke-width="1"/>
  
  <text x="470" y="176" class="col-text">cena</text>
  <text x="610" y="176" class="type-text">DECIMAL(15,0)</text>
  <line x1="430" y1="186" x2="670" y2="186" stroke="#2a2a4a" stroke-width="1"/>
  
  <text x="440" y="208" class="fk">FK</text>
  <text x="470" y="208" class="col-text">kolor</text>
  <text x="610" y="208" class="type-text">INT → kolory.id</text>
  
  <!-- Dane przykładowe -->
  <line x1="430" y1="224" x2="670" y2="224" stroke="#2a2a4a" stroke-width="1" stroke-dasharray="4"/>
  <text x="440" y="244" class="note">62 pojazdy: BM/AM</text>
  <text x="440" y="260" class="note">modele: alfa/beta/meta</text>
  
  <!-- Strzałka relacji -->
  <path d="M 420 208 L 340 208 L 340 100 L 300 100" class="arrow"/>
  
  <!-- Label relacji -->
  <rect x="316" y="146" width="48" height="20" class="badge"/>
  <text x="340" y="160" text-anchor="middle" class="badge-text">1 : N</text>
  <text x="340" y="136" text-anchor="middle" class="label">FOREIGN KEY</text>
  
  <!-- Formuła na dole -->
  <rect x="140" y="296" width="440" height="32" rx="6" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="360" y="317" text-anchor="middle" fill="#f59e0b" font-size="13" font-family="monospace" font-weight="bold">💰 cena_calkowita = pojazdy.cena + kolory.doplata  (w PHP!)</text>
</svg>